version: 1

# SLSA Level 3 build configuration for the slsa-github-generator Go builder.
# Produces a hermetically built linux/amd64 binary with signed provenance.
goos: linux
goarch: amd64

main: ./cmd/backup/
binary: backup-linux-amd64

# No -mod=vendor flag: the builder's flag allowlist rejects it, and Go uses the
# checked-in vendor/ directory automatically (go.mod declares go >= 1.14).
ldflags:
  - "-s -w -X main.version={{ .Tag }}"
