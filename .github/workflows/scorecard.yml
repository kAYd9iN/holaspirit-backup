name: scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 1 * * 1'  # every Monday 01:30 UTC
  workflow_dispatch:

# Least privilege: read-only at the workflow level; the scorecard job gets the
# write scopes it needs (upload SARIF, OIDC).
permissions:
  contents: read

jobs:
  scorecard:
    # For private repos, GITHUB_TOKEN cannot list commits via GraphQL
    # ("Resource not accessible by integration"). A PAT with 'repo' + 'read:org'
    # scopes stored as SCORECARD_TOKEN is required.
    # This job is skipped (not silently green) when the secret is absent.
    runs-on: ubuntu-latest
    if: ${{ vars.SCORECARD_ENABLED == 'true' }}
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false
          # SCORECARD_TOKEN (PAT) only improves the Branch-Protection check;
          # all other checks work with the default token on public repos.
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v3 (2026-03-06)
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
