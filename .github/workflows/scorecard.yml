name: scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 1 * * 1'  # every Monday 01:30 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  scorecard:
    # For private repos, GITHUB_TOKEN cannot list commits via GraphQL
    # ("Resource not accessible by integration"). A PAT with 'repo' + 'read:org'
    # scopes stored as SCORECARD_TOKEN is required.
    # This job is skipped (not silently green) when the secret is absent.
    runs-on: ubuntu-latest
    if: ${{ vars.SCORECARD_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false
          repo_token: ${{ secrets.SCORECARD_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@820e3160e279568db735cee8ed8f8e77a6da7818  # v3 (2026-03-06)
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
