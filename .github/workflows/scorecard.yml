name: scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 1 * * 1'  # every Monday 01:30 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  scorecard:
    # NOTE: For private repos, GITHUB_TOKEN cannot list commits via GraphQL.
    # Create a PAT with 'repo' + 'read:org' scopes and store it as secret
    # SCORECARD_TOKEN to get full scorecard results.
    # Without SCORECARD_TOKEN this job will fail gracefully (continue-on-error).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@820e3160e279568db735cee8ed8f8e77a6da7818  # v3 (2026-03-06)
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
