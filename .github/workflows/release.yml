name: release

on:
  push:
    tags:
      - 'v*'

# Least privilege (issue #25): the workflow grants nothing by default; each
# job below declares only the permissions it needs. In particular the build
# jobs do NOT get contents:write — only the release job does.
permissions:
  contents: read

jobs:
  # Security gate: every release runs the full security check suite AND is
  # blocked while any issue labeled `security` is still open. The build jobs
  # only start once this gate passes.
  security-gate:
    name: Security gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

      - name: gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.24.7 -quiet ./...

      - name: Unit tests (race detector)
        run: go test -race -cover ./...

      - name: CBOM is consistent with the source
        run: bash scripts/check-cbom.sh

      - name: Block release on non-NIST cryptography (CBOM policy)
        run: |
          # Hard gate: deny rules in policy/nist-crypto.rego fail the build if any
          # cryptographic asset in docs/cbom.cdx.json is not NIST-approved (weak
          # algorithm, or TLS < 1.2). Quantum-readiness findings are warn-only.
          go run github.com/open-policy-agent/conftest@v0.68.2 \
            test docs/cbom.cdx.json --policy policy

      - name: Block release on open security findings
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          OPEN=$(gh issue list --repo "$GITHUB_REPOSITORY" --label security --state open --json number,title --jq 'length')
          if [ "$OPEN" -gt 0 ]; then
            echo "::error::Release blocked — $OPEN open security issue(s):"
            gh issue list --repo "$GITHUB_REPOSITORY" --label security --state open
            exit 1
          fi
          echo "No open security issues — release approved."

  build:
    name: Build ${{ matrix.artifact }}
    needs: security-gate
    # Build needs OIDC for provenance attestation — but NOT contents:write.
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: backup-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: backup-linux-arm64
          - goos: windows
            goarch: amd64
            artifact: backup-windows-amd64.exe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -mod=vendor \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ${{ matrix.artifact }} \
            ./cmd/backup/

      - name: Attest SLSA provenance (Level 2)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only this job writes to the repo (creates the Release); id-token for cosign.
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          merge-multiple: true
          path: dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist/
          sha256sum backup-linux-amd64 backup-linux-arm64 backup-windows-amd64.exe > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad

      - name: Sign binaries with cosign (keyless / OIDC)
        run: |
          for binary in \
            dist/backup-linux-amd64 \
            dist/backup-linux-arm64 \
            dist/backup-windows-amd64.exe; do
            cosign sign-blob \
              --yes \
              --bundle "${binary}.bundle" \
              "${binary}"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "holaspirit-backup ${{ github.ref_name }}" \
            dist/backup-linux-amd64 \
            dist/backup-linux-arm64 \
            dist/backup-windows-amd64.exe \
            dist/backup-linux-amd64.bundle \
            dist/backup-linux-arm64.bundle \
            dist/backup-windows-amd64.exe.bundle \
            dist/SHA256SUMS
