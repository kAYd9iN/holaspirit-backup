name: api-update-check

on:
  schedule:
    - cron: '0 6 * * *'  # daily 06:00 UTC
  workflow_dispatch:

# Least privilege: read-only at the workflow level; the write scopes the check
# job needs (push drift branch, open labelled PR) are granted on the job.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # Credentials must persist — this job pushes the drift branch.
          # REPO_PAT (optional): pushing the drift branch with a PAT lets CI run
          # on the auto-created PR. With the default GITHUB_TOKEN, workflows are
          # not triggered on pushes made by workflows (GitHub recursion guard).
          persist-credentials: true
          token: ${{ secrets.REPO_PAT || github.token }}

      # The check compares Holaspirit's published OpenAPI spec (embedded in
      # the public API doc page) against the committed baseline — no token,
      # organization ID, or other credentials needed.
      - name: Check API schema
        id: check
        run: |
          set +e
          bash scripts/check-api-schema.sh
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -gt 1 ]; then
            echo "::error::check-api-schema.sh failed with exit code $code (spec download failed)"
            exit "$code"
          fi
          # Detect a freshly created baseline (first run: script writes the
          # snapshot and exits 0 — it must be committed to become the baseline).
          if ! git diff --quiet -- docs/api-snapshot.json || \
             [ -n "$(git status --porcelain docs/api-snapshot.json)" ]; then
            echo "snapshot_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "snapshot_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Claude credentials
        id: anthropic
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ] || [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.check.outputs.exit_code == '1'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      # On drift: let Claude adapt the tool to the API changes (new/removed
      # fields or endpoints → internal/api/endpoints.go), then the
      # verification step below runs the full test suite.
      - name: Adapt tool to API changes (Claude)
        if: steps.check.outputs.exit_code == '1' && steps.anthropic.outputs.present == 'true'
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc  # v1
        with:
          # Either secret works: ANTHROPIC_API_KEY (Console/pay-per-token) or
          # CLAUDE_CODE_OAUTH_TOKEN (Pro/Max subscription via `claude setup-token`).
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            The daily Holaspirit API schema check detected drift between the
            published OpenAPI spec and the stored baseline. The diff is in
            `drift.diff` (already in the working tree), and
            `docs/api-snapshot.json` has been updated to the new schema.

            Adapt the tool to the API changes:
            1. Read `drift.diff` to see which fields/endpoints were added or removed.
            2. Update `internal/api/endpoints.go` (and the endpoint list in
               `scripts/check-api-schema.sh`) so removed endpoints no longer
               break the backup and renamed/new replacements are covered.
            3. Follow the conventions in CLAUDE.md ("Extending: Adding a New Endpoint").
            4. Run `go test ./...` and fix any failures you introduced.
            Do NOT commit — the workflow commits for you. Do NOT modify workflows
            or anything outside internal/, scripts/check-api-schema.sh, and
            docs/api-snapshot.json.
          claude_args: '--max-turns 30'

      - name: Verify build and tests after adaptation
        if: steps.check.outputs.exit_code == '1'
        run: |
          go build -mod=vendor ./...
          go test -race -cover ./...

      - name: Create pull request (drift or new baseline)
        if: steps.check.outputs.exit_code == '1' || steps.check.outputs.snapshot_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT || github.token }}
          DRIFT: ${{ steps.check.outputs.exit_code }}
          CLAUDE_RAN: ${{ steps.anthropic.outputs.present }}
        run: |
          set -euo pipefail
          BRANCH="api-drift/$(date -u +%Y-%m-%d)-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/api-snapshot.json internal/ scripts/check-api-schema.sh

          if [ "$DRIFT" = "1" ]; then
            TITLE="fix: adapt to Holaspirit API drift ($(date -u +%Y-%m-%d))"
          else
            TITLE="chore: commit initial API schema baseline"
          fi
          git commit -m "$TITLE"
          git push origin "$BRANCH"

          {
            echo "## Holaspirit API schema update"
            echo
            if [ "$DRIFT" = "1" ]; then
              echo "The daily API schema check found drift against the stored baseline."
              if [ "$CLAUDE_RAN" = "true" ]; then
                echo "Claude adapted the tool to the changes; build and race tests passed."
              else
                echo "**No Claude credentials configured** (ANTHROPIC_API_KEY / CLAUDE_CODE_OAUTH_TOKEN) — only the snapshot was updated."
                echo "Review whether \`internal/api/endpoints.go\` needs changes."
              fi
              echo
              echo '### Drift'
              echo '```diff'
              cat drift.diff 2>/dev/null || echo "(diff unavailable)"
              echo '```'
            else
              echo "First run: committing \`docs/api-snapshot.json\` as the drift-detection baseline."
            fi
            echo
            echo "Merging this PR triggers the auto-release workflow (api-drift label)."
          } > pr-body.md

          gh pr create \
            --title "$TITLE" \
            --label "api-drift" \
            --body-file pr-body.md

          # Auto-merge only for snapshot-only PRs. If Claude changed Go code,
          # require a human review — drift.diff is derived from external API
          # documentation (untrusted input for the adaptation prompt), so code
          # changes must not reach main unreviewed.
          if git diff --name-only HEAD~1 HEAD | grep -q -e '^internal/' -e '^scripts/'; then
            echo "::notice::Code changes included — skipping auto-merge, human review required."
          else
            gh pr merge "$BRANCH" --auto --squash || \
              echo "::notice::Auto-merge not enabled — PR requires manual merge."
          fi
